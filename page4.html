<h1 id="text"></h1>
<script> const params = new URLSearchParams(window.location.search); const a = params.get("a"); console.log("받은 이름:", a); 
</script>

<p>
티켓은 누구나 가질 수 없습니다.<br>
같은 소리를 들은 자만이 얻을 수 있습니다.<br>

<!-- 정답 입력 -->
<input type="text" id="answer" placeholder="정답 입력" style="padding:10px;">

<!-- 제출 버튼 -->
<button onclick="checkAnswer()" style="padding:10px 20px;">
  정답 제출
</button>

<script> 
function checkAnswer() {
    const userAnswer = document.getElementById("answer").value;

    if (userAnswer === "INTRO") {
     location.href = "page5.html?a=" + encodeURIComponent(a);
    } else {
      alert("틀렸습니다!");
    }
  }
  </script>
